<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter Quest - Educational Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #667eea;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 40px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .game-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            text-decoration: none;
            color: white;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .game-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }

        .game-title {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .game-description {
            font-size: 1em;
            opacity: 0.9;
            line-height: 1.5;
        }

        .footer {
            margin-top: 40px;
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }

            .subtitle {
                font-size: 1em;
            }

            .games-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Letter Quest</h1>
        <p class="subtitle">Interactive Educational Games for Kids</p>

        <div class="games-grid">
            <a href="letter-quest.html" class="game-card">
                <div class="game-icon">🔤</div>
                <div class="game-title">Letter Quest</div>
                <div class="game-description">
                    Learn letters and numbers through keyboard practice. Features audio feedback and rewards!
                </div>
            </a>

            <a href="words.html" class="game-card">
                <div class="game-icon">📝</div>
                <div class="game-title">Words Quest</div>
                <div class="game-description">
                    Practice typing complete words with emoji hints. Perfect for building vocabulary!
                </div>
            </a>
        </div>

        <div class="footer">
            Choose a game above to start learning! 🚀
        </div>
    </div>
</body>
</html>
