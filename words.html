<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words Quest</title>
    <link rel="stylesheet" href="words.css">
</head>
<body>
    <div class="container">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
            <div class="stickers" id="stickers"></div>
        </div>
        
        <div class="letter-display" id="letterDisplay"></div>
        
        <div class="feedback" id="feedback"></div>
        
        <div class="score">
            <span id="successCount">0</span> / <span id="totalCount">0</span>
        </div>
        
        <div class="controls">
            <button id="toggleCase">Switch to Uppercase only</button>
        </div>
    </div>
    
    <audio id="audioPlayer"></audio>
    
    <script src="words.js"></script>
</body>
</html>
